# Run Enfilera anywhere Docker runs. `bin/deploy` wraps `docker compose up -d
# --build`; set DOCKER_HOST=ssh://user@host (or pick a docker context) to aim
# the same command at a remote box.
#
# Two services share one image, config, and data volume (the anchor below): the
# bot, and a sidecar that prunes the database daily so it stays bounded with no
# host cron — pruning ships with the deploy.
x-enfilera-base: &base
  image: enfilera:latest
  # Uptime matters more than horsepower: bring services back after a crash and
  # after a host reboot, unattended. This replaces a systemd unit.
  restart: unless-stopped
  # The bot token (and any ENFILERA_* overrides) come from this gitignored
  # file — never from the image or this committed compose file.
  env_file:
    - config/enfilera.env
  volumes:
    # The cafeteria's static config, read-only.
    - ./config/config.toml:/app/config/config.toml:ro
    # All dynamic state (samples, submissions, closures, halt) lives in this
    # single SQLite file on the host, so a backup is just copying it.
    - ./data:/app/data

services:
  enfilera:
    <<: *base
    build: .

  # Retention job: prune samples past the window and already-past closures once
  # a day. Reuses the bot's image (built by the `enfilera` service); the loop
  # plus restart policy keep it running with no host scheduler.
  prune:
    <<: *base
    depends_on:
      - enfilera
    command:
      - sh
      - -c
      - "while true; do python -m enfilera.prune; sleep 86400; done"
